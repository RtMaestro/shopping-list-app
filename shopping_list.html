<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f8ef7;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #3a78e0; }
    .input-row button:disabled { background: #a0aec0; cursor: not-allowed; }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
      text-align: right;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    li:hover { background: #f7fafc; }

    li + li {
      border-top: 1px solid #e2e8f0;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f8ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    .item-text.checked {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 8px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #a0aec0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #e53e3e;
      color: #e53e3e;
      background: #fff5f5;
    }

    .status-bar {
      font-size: 0.78rem;
      color: #a0aec0;
      text-align: center;
      margin-top: 16px;
    }

    .status-bar.error { color: #e53e3e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 추가..." maxlength="100">
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>
    <ul id="list"></ul>
    <div class="empty" id="empty">아직 아무것도 없어요. 위에서 추가해 보세요!</div>
    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" style="display:none">완료 항목 삭제</button>
    <div class="status-bar" id="statusBar">데이터베이스 연결 중...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qsmcjvrweyajwnkfdrvj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzbWNqdnJ3ZXlhandua2ZkcnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODQwMzksImV4cCI6MjA5MDk2MDAzOX0.iDewjA9__Z8qSWGeuxpcKE95Kum0RknDGNuw6-DWYg0';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    function setStatus(msg, isError = false) {
      const bar = document.getElementById('statusBar');
      bar.textContent = msg;
      bar.className = 'status-bar' + (isError ? ' error' : '');
    }

    function setLoading(loading) {
      document.getElementById('addBtn').disabled = loading;
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');
      const clearBtn = document.getElementById('clearBtn');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';
      const checked = items.filter(i => i.done).length;
      stats.textContent = `${checked} / ${items.length} 완료`;
      clearBtn.style.display = checked > 0 ? 'block' : 'none';

      items.forEach(item => {
        const li = document.createElement('li');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.done;
        cb.onchange = () => toggle(item.id, !item.done);

        const span = document.createElement('span');
        span.className = 'item-text' + (item.done ? ' checked' : '');
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.onclick = () => remove(item.id);

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        setStatus('불러오기 실패: ' + error.message, true);
        return;
      }

      items = data;
      render();
      setStatus('Supabase 연결됨');
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;

      setLoading(true);
      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, done: false })
        .select()
        .single();

      if (error) {
        setStatus('추가 실패: ' + error.message, true);
      } else {
        items.push(data);
        render();
        input.value = '';
        input.focus();
        setStatus('Supabase 연결됨');
      }
      setLoading(false);
    }

    async function toggle(id, newDone) {
      const { error } = await db
        .from('shopping_items')
        .update({ done: newDone })
        .eq('id', id);

      if (error) {
        setStatus('업데이트 실패: ' + error.message, true);
        render(); // revert UI
      } else {
        const item = items.find(i => i.id === id);
        if (item) item.done = newDone;
        render();
      }
    }

    async function remove(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        setStatus('삭제 실패: ' + error.message, true);
      } else {
        items = items.filter(i => i.id !== id);
        render();
      }
    }

    async function clearChecked() {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('done', true);

      if (error) {
        setStatus('삭제 실패: ' + error.message, true);
      } else {
        items = items.filter(i => !i.done);
        render();
      }
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
